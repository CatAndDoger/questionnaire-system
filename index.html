<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>高中数学课堂教学质性评价表 · 双链接入口</title>
    <style>
        /* 基础重置与全局样式 (延续毛玻璃风格) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(165deg, #eef5f9 0%, #dbeaf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            transition: all 0.2s;
        }

        body.modal-open {
            overflow: hidden;
        }

        /* 主卡片 — 毛玻璃效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 3.5rem;
            box-shadow: 0 30px 50px -20px rgba(10, 40, 60, 0.4), 0 8px 20px rgba(0, 20, 30, 0.1);
            padding: 3rem 2rem 4rem;
            max-width: 700px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.6);
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 500;
            color: #0b3954;
            letter-spacing: -0.01em;
            margin-bottom: 0.3rem;
            text-shadow: 0 2px 5px rgba(255,255,255,0.5);
        }

        .subhead {
            color: #1d4e6f;
            font-size: 2.0rem;
            font-weight: 500;
            background: rgba(255, 248, 235, 0.7);
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0.4rem 2rem;
            border-radius: 50px;
            margin-bottom: 3rem;
            border: 1px solid rgba(120, 170, 200, 0.4);
        }

        /* 双按钮容器 */
        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            justify-content: center;
            align-items: center;
            margin-top: 1.5rem;
        }

        /* 圆形按钮 */
        .circle-btn {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(6px);
            border: 3px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 25px 30px -12px #0b3954a0, 0 8px 0 0 rgba(10, 50, 70, 0.1) inset, 0 -5px 15px rgba(255, 255, 255, 0.7) inset;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
            font-weight: 600;
            color: #0b3954;
            line-height: 1.3;
            padding: 1rem;
        }

        .circle-btn span:first-child {
            font-size: 2.4rem;
            font-weight: 500;
            margin-bottom: 0.2rem;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.1));
        }

        .circle-btn span:last-child {
            font-size: 1.1rem;
            opacity: 0.9;
            background: #0b3954;
            color: white;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px #00000020;
        }

        .circle-btn.judge {
            background: linear-gradient(145deg, #f1faff, #d7e9f5);
        }

        .circle-btn.player {
            background: linear-gradient(145deg, #fff7eb, #fae8d9);
        }

        .circle-btn:active {
            transform: scale(0.96);
            box-shadow: 0 12px 20px -10px #0b3954;
        }

        /* 模态层 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 35, 50, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 1.5rem;
        }

        .modal-content {
            background: #ffffffec;
            border-radius: 3rem;
            max-width: 750px;
            width: 100%;
            max-height: 90vh;
            padding: 2rem 2rem 1.8rem;
            box-shadow: 0 40px 70px 15px #00000040;
            border: 2px solid white;
            overflow-y: auto;
            animation: modalRise 0.25s ease;
        }

        @keyframes modalRise {
            0% { opacity: 0.3; transform: scale(0.96) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .modal-header h2 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #0b3954;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2.6rem;
            line-height: 1;
            cursor: pointer;
            color: #3d637b;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #d0e2ef;
        }

        /* 通用链接面板样式 (复用) */
        .judge-panel, .player-panel {
            width: 100%;
        }

        .hidden-panel {
            display: none;
        }

        .link-content {
            padding: 1rem 0.5rem;
            text-align: center;
        }

        .link-label {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1f4a66;
            margin-bottom: 1.2rem;
        }

        .link-box {
            background: #edf4fa;
            border-radius: 60px;
            padding: 1rem 1.8rem;
            font-size: 1.1rem;
            word-break: break-all;
            border: 1px solid #8bb3cc;
            color: #063048;
            margin-bottom: 2rem;
            box-shadow: inset 0 2px 5px #0000000a;
            font-family: monospace;
        }

        .action-btn {
            background: #0b3954;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: 600;
            padding: 1.2rem 2rem;
            border-radius: 80px;
            box-shadow: 0 20px 30px -8px #0b3954b0;
            width: 100%;
            cursor: pointer;
            border: 2px solid #ffffff80;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            text-decoration: none;
            transition: all 0.2s;
            margin-top: 0.8rem;
        }

        .action-btn:active {
            transform: scale(0.96);
            box-shadow: 0 10px 20px -5px #0b3954;
        }

        .hint-text {
            color: #1e506e;
            background: #e9f1f8;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.95rem;
        }

        /* 手机优化 */
        @media (max-width: 500px) {
            .glass-card { padding: 2rem 1rem 3rem; }
            h1 { font-size: 2rem; }
            .circle-btn { width: 140px; height: 140px; }
            .circle-btn span:first-child { font-size: 2rem; }
            .modal-content { padding: 1.5rem; }
            .action-btn { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>高中数学课堂教学</h1>
        <div class="subhead">质性评价平台</div>

        <div class="button-row">
            <!-- 评委端圆形按钮 -->
            <div class="circle-btn judge" id="judgeBtn">
                <span>📋</span>
                <span>评委端</span>
            </div>
            <!-- 选手端圆形按钮 -->
            <div class="circle-btn player" id="playerBtn">
                <span>🎤</span>
                <span>选手端</span>
            </div>
        </div>
    </div>

    <!-- 统一模态框 (内嵌两个链接面板) -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content" id="modalContent" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">评委端 · 评价链接</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>

            <!-- 评委端面板 (链接) -->
            <div class="judge-panel" id="judgePanel">
                <div class="link-content">
                    <div class="link-label">📋 评委端 · 质性评价问卷</div>
                    <div class="link-box" id="judgeLinkDisplay">https://v.wjx.cn/vm/PU1TPtf.aspx#</div>
                    <a href="#" id="judgeLinkBtn" class="action-btn" target="_blank" rel="noopener noreferrer">
                        <span>📝</span> 前往评价 <span>📌</span>
                    </a>
                    <div class="hint-text">点击按钮在新页面打开链接</div>
                </div>
            </div>

            <!-- 选手端面板 (链接) 初始隐藏 -->
            <div class="player-panel hidden-panel" id="playerPanel">
                <div class="link-content">
                    <div class="link-label">🎤 选手端 · 问卷结果查询</div>
                    <div class="link-box" id="playerLinkDisplay">https://www.wjx.cn/resultquery.aspx?activity=352616813</div>
                    <a href="#" id="playerLinkBtn" class="action-btn" target="_blank" rel="noopener noreferrer">
                        <span>🚀</span> 前往填写 <span>📋</span>
                    </a>
                    <div class="hint-text">点击按钮在新页面打开链接</div>
                </div>
            </div>
        </div>
    </div>
<style>
  #playerLinkDisplay {
    display: none;
  }
  #judgeLinkDisplay {
    display: none;
  }
</style>
    <script>
        
        (function() {
            // 获取元素
            const modalOverlay = document.getElementById('modalOverlay');
            const judgeBtn = document.getElementById('judgeBtn');
            const playerBtn = document.getElementById('playerBtn');
            const closeBtn = document.getElementById('closeModalBtn');
            const modalTitle = document.getElementById('modalTitle');

            // 两个面板
            const judgePanel = document.getElementById('judgePanel');
            const playerPanel = document.getElementById('playerPanel');

            // 评委端内部元素
            const judgeLinkBtn = document.getElementById('judgeLinkBtn');
            const judgeLinkDisplay = document.getElementById('judgeLinkDisplay');

            // 选手端内部元素
            const playerLinkBtn = document.getElementById('playerLinkBtn');
            const playerLinkDisplay = document.getElementById('playerLinkDisplay');

            // 固定链接
            const JUDGE_URL = 'https://v.wjx.cn/vm/PU1TPtf.aspx#';   // 评委端新链接
            const PLAYER_URL = 'https://www.wjx.cn/resultquery.aspx?activity=352616813'; // 选手端链接

            // 显示对应面板
            function showPanel(panelType) {
                if (panelType === 'judge') {
                    judgePanel.classList.remove('hidden-panel');
                    playerPanel.classList.add('hidden-panel');
                    modalTitle.innerText = '评委端 · 评价链接';
                    // 设置评委端链接
                    judgeLinkBtn.href = JUDGE_URL;
                    judgeLinkDisplay.innerText = JUDGE_URL;
                } else {
                    playerPanel.classList.remove('hidden-panel');
                    judgePanel.classList.add('hidden-panel');
                    modalTitle.innerText = '选手端 · 问卷链接';
                    // 设置选手端链接
                    playerLinkBtn.href = PLAYER_URL;
                    playerLinkDisplay.innerText = PLAYER_URL;
                }
            }

            // 打开模态框
            function openModal() {
                modalOverlay.style.display = 'flex';
                document.body.classList.add('modal-open');
            }

            // 关闭模态框
            function closeModal() {
                modalOverlay.style.display = 'none';
                document.body.classList.remove('modal-open');
            }

            // 事件绑定
            judgeBtn.addEventListener('click', () => {
                showPanel('judge');
                openModal();
            });

            playerBtn.addEventListener('click', () => {
                showPanel('player');
                openModal();
            });

            closeBtn.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', closeModal);
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay.style.display === 'flex') {
                    closeModal();
                }
            });

            // 初始隐藏选手面板（评委面板默认显示，但模态框关闭时不可见）
            playerPanel.classList.add('hidden-panel');
        })();
    </script>
</body>
</html>
</html>
